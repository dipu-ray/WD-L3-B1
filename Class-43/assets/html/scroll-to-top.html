<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll to Top</title>
    <style>
        * {
            margin: 0;
        }

        .content1 {
            background-color: red;
            width: 100%;
            height: 100vh;
        }

        .content2 {
            background-color: green;
            width: 100%;
            height: 100vh;
        }

        .content3 {
            background-color: blue;
            width: 100%;
            height: 100vh;
        }

        #scrollTopBtn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 30px;
            z-index: 1000;
            padding: 10px 15px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }

        #scrollTopBtn:hover {
            background-color: #333;
        }
    </style>
</head>

<body>
    <button id="scrollTopBtn" title="Go to top">Top</button>
    <section class="content1"></section>
    <section class="content2"></section>
    <section class="content3"></section>

    <script>
        // Get Top Button Element
        const topButton = document.getElementById("scrollTopBtn");

        // Show top button when scroll y-axis 100px
        window.addEventListener("scroll", () => {
            if(window.scrollY > 100) {
                topButton.style.display = "block";
            } else {
                topButton.style.display = "none";
            }
        });

        // Smooth scroll going on top
        topButton.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>
</body>

</html>
