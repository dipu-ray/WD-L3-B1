<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Card Design</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Dashboard Stats</h1>
    <p class="subtitle">Scroll down or refresh to see the animation</p>

    <!-- Cards Container -->
    <div class="cards">
        <!-- Card 1 -->
        <div class="card">
            <div class="card-icon">👥</div>
            <div class="card-value">
                <span class="counter" data-target="12540" data-suffix="+">0</span>
                <span class="card-suffix">+</span>
            </div>
            <div class="card-label">Total Users</div>
            <div class="progress-bar">
                <div class="progress-fill" data-progress="85"></div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <div class="card-icon">💰</div>
            <div class="card-value">
                <span class="card-suffix">$</span>
                <span class="counter" data-target="84200">0</span>
            </div>
            <div class="card-label">Revenue</div>
            <div class="progress-bar">
                <div class="progress-fill" data-progress="72"></div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <div class="card-icon">📦</div>
            <div class="card-value">
                <span class="counter" data-target="3650">0</span>
            </div>
            <div class="card-label">Orders</div>
            <div class="progress-bar">
                <div class="progress-fill" data-progress="60"></div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="card">
            <div class="card-icon">⭐</div>
            <div class="card-value">
                <span class="counter" data-target="4.9" data-decimals="1">0</span>
            </div>
            <div class="card-label">Rating</div>
            <div class="progress-bar">
                <div class="progress-fill" data-progress="98"></div>
            </div>
        </div>
    </div>

    <!-- To link my JS file -->
    <script src="script.js"></script>

</body>

</html>
