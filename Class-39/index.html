<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glow"></div>
    <div class="container">
        <h1>✨ Glowing Todos ✨</h1>
        <div class="input-container">
            <input type="text" id="todoInput" placeholder="Add your magical task..." maxlength="60">
            <button id="addBtn">Add Task</button>
        </div>
        <div class="todos" id="todos"></div>
        <button class="clear-btn" id="clearAllBtn" style="display:none;">🧹 Clear All Completed</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
