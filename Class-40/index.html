<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Application</title>

    <!-- Google font links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- To link CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="weather-card">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name" />
            <button onclick="getWeather()">Search</button>
        </div>
        <img id="weatherIcon" class="weather-icon" src="https://cdn-icons-png.flaticon.com/512/1146/1146869.png" alt="Weather Icon">

        <!-- After find the weather -->
        <h2 id="condition" class="condition"></h2>
        <div class="temperature"><span id="temp"></span><span></span></div>
        <h3 id="city" class="city"></h3>
    </div>

    <!-- To link my JS file -->
    <script src="script.js"></script>
</body>

</html>
