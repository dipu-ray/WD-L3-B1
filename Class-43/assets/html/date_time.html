<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date and Time</title>
</head>

<body>
    <h1 id="clock"></h1>

    <script>
        // Date & Time: 5/8/2026, 7:56:18 PM
        // function showDateTime() {
        //     let d = new Date();
        //     document.getElementById("clock").innerHTML = d.toLocaleString();
        // }
        // setInterval(showDateTime, 1000);
        // showDateTime();

        // Date & Time: 5 May 2026, 7:56:18 PM
        function showDateTime() {
            let d = new Date();
            let dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            let datePart = d.toLocaleDateString('en-GB', dateOptions);
            let timePart = d.toLocaleTimeString();
            document.getElementById("clock").innerHTML = datePart + ", " + timePart;
        }
        setInterval(showDateTime, 1000);
        showDateTime();
    </script>

</body>

</html>
