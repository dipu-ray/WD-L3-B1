<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #091236, #02081f);
            padding: 20px;
        }

        .weather-card {
            width: 360px;
            padding: 30px;
            border-radius: 30px;
            background: radial-gradient(circle at top left, rgba(255, 170, 0, 0.25), transparent 30%),
                linear-gradient(180deg, #08112f, #02081d);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            outline: none;
            border-radius: 15px;
            font-size: 16px;
        }

        .search-box button {
            padding: 12px 18px;
            border: none;
            border-radius: 15px;
            background: #0ea5ff;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #0284e6;
        }

        .weather-icon {
            width: 180px;
            margin: 10px auto;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .condition {
            font-size: 2rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .temperature {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
            margin: 10px 0;
        }

        .temperature span {
            color: #0ea5ff;
            font-size: 4rem;
            vertical-align: top;
        }

        .city {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #dbeafe;
        }
    </style>
</head>

<body>
    <div class="weather-card">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name" />
            <button onclick="getWeather()">Search</button>
        </div>

        <img id="weatherIcon" class="weather-icon" src="https://cdn-icons-png.flaticon.com/512/1146/1146869.png"
            alt="Weather Icon">

        <h2 id="condition" class="condition"></h2>
        <div class="temperature"><span id="temp"></span><span></span></div>
        <h3 id="city" class="city"></h3>
    </div>
</body>

</html>
