<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <!-- Hamburger Menu (Mobile) - Moved to left -->
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <!-- Left: Logo -->
        <div class="nav-logo">
            <a href="#">MyBrand</a>
        </div>

        <!-- Center: Menu Items -->
        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="#" class="nav-link">About</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Services</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Portfolio</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>

            <!-- CTA Button inside menu for mobile -->
            <li class="nav-item nav-cta-mobile">
                <a href="#" class="cta-button">Get Started</a>
            </li>
        </ul>

        <!-- Right: CTA Button (Desktop) -->
        <div class="nav-cta">
            <a href="#" class="cta-button">Get Started</a>
        </div>
    </nav>

    <!-- Dummy content to show navbar effect -->
    <section class="hero">
        <h1>Welcome to MyBrand</h1>
        <p>A simple responsive navbar example using HTML, CSS & JavaScript.</p>
    </section>

    <script src="script.js"></script>
</body>

</html>
