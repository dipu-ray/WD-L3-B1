<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <form id="myForm">
            <h2>Contact Us</h2>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fname" name="fname" placeholder="Enter name">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="mail" name="mail" placeholder="Enter mail">
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea rows="4" id="msg" name="msg" placeholder="Write your messages..."></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        // Get Elements with DOM
        const myForm = document.getElementById("myForm");
        const fullName = document.getElementById("fname");
        const yourMail = document.getElementById("mail");
        const sendMsg = document.getElementById("msg");

        // Checking inputs and get permission when submit
        myForm.addEventListener("submit", function (event) {
            event.preventDefault(); // Default reload are off

            // Value set and spaces into input
            const name = fullName.value.trim();
            const mail = yourMail.value.trim();
            const message = sendMsg.value.trim();

            // Checking empty and spaces
            if (name === "") {
                alert("Enter name");
            } else if (name.length < 4) {
                alert("Enter full name above 4 words");
            } else if (mail === "") {
                alert("Enter mail");
            } else if (message === "") {
                alert("Enter you messages");
            } else if (message.length < 10) {
                alert("Enter you messages above 10 words");
            } else {
                alert("Thank you " + name + ". Submit done!");
                myForm.reset(); // Clear form data after submit
            }
        });
    </script>

</body>

</html>
