<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 30 | Responsive Navbar</title>

    <!-- Google poppins fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="container">
        <nav class="navbar">
            <!-- Navbar logo -->
            <div class="logo">
                <a href="">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>

            <!-- Navbar middle links -->
            <div class="m-links">
                <ul>
                    <li><a href="#x">Features</a></li>
                    <li><a href="#x">Product Guide</a></li>
                    <li><a href="#x">Templates</a></li>
                    <li><a href="#x">Pricing</a></li>
                    <li><a href="#x">Enterprise</a></li>
                </ul>
            </div>

            <!-- Navbar right links -->
            <div class="r-links">
                <ul>
                    <li><a class="get-in-btn" href="#x">Get it free</a></li>
                    <li><a class="sign-in-btn" href="#x">Sign in</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <script src="script.js"></script>
</body>

</html>
