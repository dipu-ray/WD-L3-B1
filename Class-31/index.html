<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Class 27 | Vertical Timeline Bar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="timeline-section">
        <div class="container">
            <h2 class="section-title">ABOUT</h2>

            <div class="timeline">
                <!-- Item 1: Text in left part -->
                <div class="timeline-item left">
                    <div class="timeline-content">
                        <h3>2009-2011</h3>
                        <h4>Our Humble Beginnings</h4>
                        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sunt ut voluptatum eius sapiente.
                        </p>
                    </div>
                    <div class="timeline-img">
                        <img src="https://startbootstrap.github.io/startbootstrap-agency/assets/img/about/1.jpg"
                            alt="Work">
                    </div>
                    <div class="empty-space"></div> <!-- Some spaces with right side -->
                </div>

                <!-- Item 2: Text in right part -->
                <div class="timeline-item right">
                    <div class="empty-space"></div> <!-- Some spaces with left side -->
                    <div class="timeline-img">
                        <img src="https://startbootstrap.github.io/startbootstrap-agency/assets/img/about/2.jpg"
                            alt="Work">
                    </div>
                    <div class="timeline-content">
                        <h3>March 2011</h3>

                        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sunt ut voluptatum eius sapiente.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
